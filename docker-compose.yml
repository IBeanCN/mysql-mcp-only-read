services:

  # ── MySQL Readonly MCP Server ─────────────────────────────────────────────
  mysql-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: mysql-mcp-server:latest
    container_name: mysql-mcp-server
    restart: unless-stopped
    # Port mapping is commented out by default.
    # For production, place a TLS-terminating reverse proxy (nginx/caddy/traefik)
    # in front and set MCP_BEARER_TOKEN. Only expose directly for local dev:
    #   ports:
    #     - "127.0.0.1:${MCP_PORT:-8000}:8000"
    environment:
      # MySQL connection — override with a .env file or shell environment
      MYSQL_HOST: "${MYSQL_HOST:-host.docker.internal}"
      MYSQL_PORT: "${MYSQL_PORT:-3306}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_CONNECT_TIMEOUT: "${MYSQL_CONNECT_TIMEOUT:-10}"
      MYSQL_READ_TIMEOUT: "${MYSQL_READ_TIMEOUT:-30}"
      MYSQL_WRITE_TIMEOUT: "${MYSQL_WRITE_TIMEOUT:-30}"
      MYSQL_MAX_EXECUTION_TIME: "${MYSQL_MAX_EXECUTION_TIME:-30000}"
      MYSQL_SSL: "${MYSQL_SSL:-false}"
      MYSQL_SSL_CA: "${MYSQL_SSL_CA:-}"
      MYSQL_SSL_CERT: "${MYSQL_SSL_CERT:-}"
      MYSQL_SSL_KEY: "${MYSQL_SSL_KEY:-}"
      MYSQL_SSL_VERIFY_CERT: "${MYSQL_SSL_VERIFY_CERT:-true}"
      QUERY_DEFAULT_LIMIT: "${QUERY_DEFAULT_LIMIT:-100}"
      QUERY_TABLE_BLACKLIST: "${QUERY_TABLE_BLACKLIST:-}"
      MCP_BEARER_TOKEN: "${MCP_BEARER_TOKEN}"
      # Inside the container the SSE server must bind all interfaces
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8000"
    # Uncomment if MySQL runs as another Docker service in the same compose file:
    # depends_on:
    #   mysql:
    #     condition: service_healthy

  # ── Optional: local MySQL for development / testing ───────────────────────
  # Uncomment this service to spin up a local MySQL alongside the MCP server.
  #
  # mysql:
  #   image: mysql:8.4
  #   container_name: mysql-dev
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_ROOT_PASSWORD: rootpassword
  #     MYSQL_DATABASE: mydb
  #     MYSQL_USER: mcpuser
  #     MYSQL_PASSWORD: mcppassword
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "--password=rootpassword"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

