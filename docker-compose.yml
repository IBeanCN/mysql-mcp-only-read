services:

  # ── MySQL Readonly MCP Server ─────────────────────────────────────────────
  mysql-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: mysql-mcp-server:latest
    container_name: mysql-mcp-server
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-8000}:8000"
    environment:
      # MySQL connection — override with a .env file or shell environment
      MYSQL_HOST: "${MYSQL_HOST:-host.docker.internal}"
      MYSQL_PORT: "${MYSQL_PORT:-3306}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_CONNECT_TIMEOUT: "${MYSQL_CONNECT_TIMEOUT:-10}"
      MYSQL_SSL: "${MYSQL_SSL:-false}"
      QUERY_DEFAULT_LIMIT: "${QUERY_DEFAULT_LIMIT:-100}"
      # SSE bind settings (inside the container, always bind 0.0.0.0:8000)
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8000"
    # Uncomment if MySQL runs as another Docker service in the same compose file:
    # depends_on:
    #   mysql:
    #     condition: service_healthy

  # ── Optional: local MySQL for development / testing ───────────────────────
  # Uncomment this service to spin up a local MySQL alongside the MCP server.
