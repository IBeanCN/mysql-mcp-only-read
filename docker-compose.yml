  #     MYSQL_ROOT_PASSWORD: rootpassword
  #     MYSQL_DATABASE: mydb
  #     MYSQL_USER: mcpuser
  #     MYSQL_PASSWORD: mcppassword
  #   ports:
  #     - "3306:3306"
